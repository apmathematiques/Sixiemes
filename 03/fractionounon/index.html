<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exercice interactif</title>
<style>
:root{--accent:#2F7F89;--success:#C8FE53;--ink:#171717;--muted:#666;--part:#F4C95D;--partSoft:#FFF2B8;--error:#FFF1EF;--errorInk:#8D2F24;--errorBorder:#F3A89F}
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%}
body{font-family:Arial,sans-serif;background:transparent;color:var(--ink);display:flex;align-items:center;justify-content:center;overflow:hidden}
button{font:inherit}#app{width:min(96vw,1020px);height:min(96vh,700px);padding:14px}
.hud{display:flex;justify-content:space-between;gap:12px;background:rgba(255,255,255,.88);border-radius:14px;padding:10px 16px;margin-bottom:12px;font-size:clamp(15px,2vw,21px);font-weight:bold;box-shadow:0 5px 16px rgba(0,0,0,.05)}
.card{background:rgba(255,255,255,.94);border-radius:24px;min-height:calc(100% - 56px);padding:clamp(14px,2.5vw,26px);box-shadow:0 10px 25px rgba(0,0,0,.08);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center}
.question{font-size:clamp(20px,2.8vw,30px);margin:0;line-height:1.25}
.figure-wrap{width:min(100%,620px);min-height:290px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.72);border:3px solid #ECECEC;border-radius:22px;padding:14px;overflow:hidden}
.figure-wrap svg{width:100%;max-width:560px;height:auto;max-height:280px;display:block}
.choice-row{display:grid;grid-template-columns:repeat(2,minmax(150px,220px));justify-content:center;gap:16px;width:100%}
.choice{border:0;border-radius:16px;padding:13px 22px;min-height:54px;font-size:clamp(18px,2.2vw,23px);font-weight:800;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.16);transition:.12s}
.choice:hover:not(:disabled){transform:translateY(-2px);filter:brightness(1.03)}.choice:disabled{cursor:default;opacity:.62}.choice.chosen{opacity:1;outline:4px solid rgba(47,127,137,.18)}
#yesBtn{background:var(--accent);color:white}#noBtn{background:#696969;color:white}
#feedback{display:none;width:min(100%,760px);border-radius:16px;padding:12px 16px;font-size:clamp(15px,1.9vw,19px);line-height:1.38}
#feedback.success{display:block;background:var(--success);color:#294100;font-weight:bold}#feedback.error{display:block;background:var(--error);color:var(--errorInk);border:2px solid var(--errorBorder)}
.action{display:none;border:0;border-radius:15px;padding:12px 24px;background:var(--accent);color:white;min-width:210px;font-size:clamp(16px,2vw,21px);font-weight:bold;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.15)}
#final{display:none;height:100%;background:rgba(255,255,255,.96);border-radius:24px;padding:clamp(24px,4vw,40px);text-align:center;box-shadow:0 10px 25px rgba(0,0,0,.08)}
#finalInner{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px}#final h1{margin:0;font-size:clamp(28px,4vw,42px)}#finalScore{font-size:clamp(58px,10vw,92px);font-weight:900;color:var(--accent)}#advice{font-size:clamp(19px,2.7vw,28px);max-width:760px;line-height:1.35}#restartBtn{display:inline-block}
.highlight{animation:pulse 1.1s ease-in-out infinite alternate}@keyframes pulse{from{filter:drop-shadow(0 0 0 rgba(216,70,53,0))}to{filter:drop-shadow(0 0 8px rgba(216,70,53,.55))}}
@media(max-width:620px){#app{padding:8px}.card{gap:10px}.figure-wrap{min-height:230px;padding:8px}.choice-row{grid-template-columns:1fr 1fr;gap:10px}.choice{min-width:0;padding:11px 10px}}
@media(max-height:650px){.card{gap:8px;padding:10px}.figure-wrap{min-height:210px}.figure-wrap svg{max-height:205px}.choice{min-height:46px;padding:9px 18px}#feedback{padding:9px 13px}}
</style>
</head>
<body>
<div id="app">
<div id="game">
<div class="hud"><span id="progress"></span><span id="score"></span></div>
<div class="card">
<p class="question">Cette figure peut-elle représenter une fraction&nbsp;?</p>
<div class="figure-wrap" id="figureWrap" aria-live="polite"></div>
<div class="choice-row"><button class="choice" id="yesBtn">Oui</button><button class="choice" id="noBtn">Non</button></div>
<div id="feedback" role="status"></div>
<button class="action" id="nextBtn">Question suivante</button>
</div></div>
<div id="final"><div id="finalInner"><h1>Bilan</h1><div id="finalScore"></div><div id="advice"></div><button class="action" id="restartBtn">Recommencer</button></div></div>
</div>
<script>
(function(){
"use strict";
var current=0,score=0,answered=false,order=[];
function el(id){return document.getElementById(id)}
function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1)),t=a[i];a[i]=a[j];a[j]=t}return a}
var figs=[
{a:true,c:"Les 4 parts sont toutes de même taille. Cette figure peut donc représenter une fraction.",s:function(r){return `<svg viewBox="0 0 560 280" role="img" aria-label="Rectangle partagé en quatre parts égales"><rect x="70" y="55" width="420" height="170" fill="white" stroke="#222" stroke-width="5"/><rect x="70" y="55" width="210" height="170" fill="var(--partSoft)"/><line x1="175" y1="55" x2="175" y2="225" stroke="#222" stroke-width="4"/><line x1="280" y1="55" x2="280" y2="225" stroke="#222" stroke-width="4"/><line x1="385" y1="55" x2="385" y2="225" stroke="#222" stroke-width="4"/><rect x="70" y="55" width="420" height="170" fill="none" stroke="#222" stroke-width="5"/></svg>`}},
{a:false,c:"Les parts n'ont pas toutes la même taille : la bande du milieu est plus large. Cette figure ne peut donc pas représenter une fraction.",s:function(r){return `<svg viewBox="0 0 560 280" role="img" aria-label="Rectangle partagé en parts inégales"><rect x="65" y="55" width="430" height="170" fill="white" stroke="#222" stroke-width="5"/><rect x="65" y="55" width="95" height="170" fill="var(--partSoft)"/><rect x="255" y="55" width="145" height="170" fill="${r?'#FFE0DC':'white'}" class="${r?'highlight':''}"/><line x1="160" y1="55" x2="160" y2="225" stroke="#222" stroke-width="4"/><line x1="255" y1="55" x2="255" y2="225" stroke="#222" stroke-width="4"/><line x1="400" y1="55" x2="400" y2="225" stroke="#222" stroke-width="4"/><rect x="65" y="55" width="430" height="170" fill="none" stroke="#222" stroke-width="5"/>${r?'<path d="M255 42 L400 42" stroke="#D84635" stroke-width="6" stroke-linecap="round"/><text x="327" y="32" text-anchor="middle" font-size="22" font-weight="700" fill="#A63225">plus large</text>':''}</svg>`}},
{a:true,c:"Les 6 secteurs ont le même angle au centre. Ils ont donc la même aire. Cette figure peut représenter une fraction.",s:function(r){return `<svg viewBox="0 0 560 280" role="img" aria-label="Disque partagé en six secteurs égaux"><g transform="translate(280 140)"><path d="M0 0 L0 -105 A105 105 0 0 1 90.93 -52.5 Z" fill="var(--partSoft)"/><path d="M0 0 L90.93 -52.5 A105 105 0 0 1 90.93 52.5 Z" fill="var(--partSoft)"/><circle r="105" fill="none" stroke="#222" stroke-width="5"/><line x1="0" y1="0" x2="0" y2="-105" stroke="#222" stroke-width="4"/><line x1="0" y1="0" x2="90.93" y2="-52.5" stroke="#222" stroke-width="4"/><line x1="0" y1="0" x2="90.93" y2="52.5" stroke="#222" stroke-width="4"/><line x1="0" y1="0" x2="0" y2="105" stroke="#222" stroke-width="4"/><line x1="0" y1="0" x2="-90.93" y2="52.5" stroke="#222" stroke-width="4"/><line x1="0" y1="0" x2="-90.93" y2="-52.5" stroke="#222" stroke-width="4"/></g></svg>`}},
{a:false,c:"Un secteur est beaucoup plus grand que les autres. Les secteurs n'ont donc pas tous le même angle au centre ni la même aire. Cette figure ne peut pas représenter une fraction.",s:function(r){return `<svg viewBox="0 0 560 280" role="img" aria-label="Disque partagé en secteurs très inégaux"><g transform="translate(280 140)"><path d="M0 0 L0 -105 A105 105 0 0 1 30.1 100.6 Z" fill="${r?'#FFE0DC':'#FFD9D5'}" class="${r?'highlight':''}"/><path d="M0 0 L0 -105 A105 105 0 0 0 -74.2 -74.2 Z" fill="var(--partSoft)"/><circle cx="0" cy="0" r="105" fill="none" stroke="#222" stroke-width="5"/><line x1="0" y1="0" x2="0" y2="-105" stroke="#222" stroke-width="4"/><line x1="0" y1="0" x2="30.1" y2="100.6" stroke="#222" stroke-width="4"/><line x1="0" y1="0" x2="-31.0" y2="100.3" stroke="#222" stroke-width="4"/><line x1="0" y1="0" x2="-91.0" y2="52.5" stroke="#222" stroke-width="4"/><line x1="0" y1="0" x2="-103.4" y2="-18.2" stroke="#222" stroke-width="4"/><line x1="0" y1="0" x2="-74.2" y2="-74.2" stroke="#222" stroke-width="4"/>${r?'<path d="M20 -116 A132 132 0 0 1 45 120" fill="none" stroke="#D84635" stroke-width="7" stroke-linecap="round"/><text x="136" y="8" font-size="22" font-weight="700" fill="#A63225">beaucoup plus grand</text>':''}</g></svg>`}},
{a:true,c:"La bande est partagée en 5 parts de même longueur. Cette figure peut donc représenter une fraction.",s:function(r){return `<svg viewBox="0 0 560 280" role="img" aria-label="Bande partagée en cinq parts égales"><rect x="55" y="95" width="450" height="90" fill="white" stroke="#222" stroke-width="5"/><rect x="55" y="95" width="270" height="90" fill="var(--partSoft)"/><line x1="145" y1="95" x2="145" y2="185" stroke="#222" stroke-width="4"/><line x1="235" y1="95" x2="235" y2="185" stroke="#222" stroke-width="4"/><line x1="325" y1="95" x2="325" y2="185" stroke="#222" stroke-width="4"/><line x1="415" y1="95" x2="415" y2="185" stroke="#222" stroke-width="4"/><rect x="55" y="95" width="450" height="90" fill="none" stroke="#222" stroke-width="5"/></svg>`}},
{a:false,c:"Les parts n'ont pas toutes la même longueur : l'une d'elles est plus courte. Cette figure ne peut donc pas représenter une fraction.",s:function(r){return `<svg viewBox="0 0 560 280" role="img" aria-label="Bande partagée en longueurs inégales"><rect x="55" y="95" width="450" height="90" fill="white" stroke="#222" stroke-width="5"/><rect x="55" y="95" width="180" height="90" fill="var(--partSoft)"/><rect x="325" y="95" width="55" height="90" fill="${r?'#FFE0DC':'white'}" class="${r?'highlight':''}"/><line x1="145" y1="95" x2="145" y2="185" stroke="#222" stroke-width="4"/><line x1="235" y1="95" x2="235" y2="185" stroke="#222" stroke-width="4"/><line x1="325" y1="95" x2="325" y2="185" stroke="#222" stroke-width="4"/><line x1="380" y1="95" x2="380" y2="185" stroke="#222" stroke-width="4"/><rect x="55" y="95" width="450" height="90" fill="none" stroke="#222" stroke-width="5"/>${r?'<path d="M325 78 L380 78" stroke="#D84635" stroke-width="6" stroke-linecap="round"/><text x="352.5" y="66" text-anchor="middle" font-size="22" font-weight="700" fill="#A63225">plus courte</text>':''}</svg>`}},
{a:true,c:"Le carré est partagé en 9 petits carrés de même taille. Cette figure peut donc représenter une fraction.",s:function(r){return `<svg viewBox="0 0 560 280" role="img" aria-label="Carré partagé en neuf carrés égaux"><rect x="175" y="30" width="210" height="210" fill="white" stroke="#222" stroke-width="5"/><rect x="175" y="30" width="140" height="140" fill="var(--partSoft)"/><line x1="245" y1="30" x2="245" y2="240" stroke="#222" stroke-width="4"/><line x1="315" y1="30" x2="315" y2="240" stroke="#222" stroke-width="4"/><line x1="175" y1="100" x2="385" y2="100" stroke="#222" stroke-width="4"/><line x1="175" y1="170" x2="385" y2="170" stroke="#222" stroke-width="4"/><rect x="175" y="30" width="210" height="210" fill="none" stroke="#222" stroke-width="5"/></svg>`}},
{a:false,c:"Les parts du partage n'ont pas toutes la même taille : certaines bandes sont plus larges que d'autres. Cette figure ne peut donc pas représenter une fraction à partir de ce partage.",s:function(r){return `<svg viewBox="0 0 560 280" role="img" aria-label="Rectangle partagé en bandes de largeurs différentes"><rect x="60" y="65" width="440" height="150" rx="3" fill="white" stroke="#222" stroke-width="5"/><rect x="60" y="65" width="78" height="150" fill="var(--partSoft)"/><rect x="259" y="65" width="103" height="150" fill="var(--partSoft)"/><rect x="138" y="65" width="121" height="150" fill="${r?'#FFE0DC':'white'}" class="${r?'highlight':''}"/><line x1="138" y1="65" x2="138" y2="215" stroke="#222" stroke-width="4"/><line x1="259" y1="65" x2="259" y2="215" stroke="#222" stroke-width="4"/><line x1="362" y1="65" x2="362" y2="215" stroke="#222" stroke-width="4"/><rect x="60" y="65" width="440" height="150" rx="3" fill="none" stroke="#222" stroke-width="5"/>${r?'<path d="M138 48 L259 48" stroke="#D84635" stroke-width="6" stroke-linecap="round"/><text x="198.5" y="36" text-anchor="middle" font-size="21" font-weight="700" fill="#A63225">plus large</text>':''}</svg>`}}
];
function cur(){return figs[order[current]]}
function hud(){el('progress').textContent='Question '+(current+1)+' / 8';el('score').textContent='Score : '+score+' / 8'}
function show(){answered=false;hud();el('figureWrap').innerHTML=cur().s(false);el('feedback').className='';el('feedback').style.display='none';el('feedback').textContent='';el('yesBtn').disabled=false;el('noBtn').disabled=false;el('yesBtn').className='choice';el('noBtn').className='choice';el('nextBtn').style.display='none'}
function answer(v){if(answered)return;answered=true;var q=cur(),ok=v===q.a;if(ok)score++;el('yesBtn').disabled=true;el('noBtn').disabled=true;(v?el('yesBtn'):el('noBtn')).classList.add('chosen');el('figureWrap').innerHTML=q.s(true);hud();var f=el('feedback');f.className=ok?'success':'error';f.innerHTML=(ok?'Bravo ! ':'Ce n\'est pas la bonne réponse. ')+q.c;f.style.display='block';el('nextBtn').style.display='inline-block'}
function next(){if(current<7){current++;show()}else final()}
function final(){el('game').style.display='none';el('final').style.display='block';el('finalScore').textContent=score+' / 8';el('advice').textContent=score<=3?'Reprends le temps d\'observer chaque découpage : pour représenter une fraction, les parts doivent être égales.':score<=5?'C\'est en bonne voie. Vérifie toujours la taille ou l\'aire de toutes les parts avant de répondre.':score<=7?'Très bon travail ! Tu sais presque toujours reconnaître un partage en parts égales.':'Excellent ! Tu reconnais parfaitement les figures partagées en parts égales.'}
function restart(){current=0;score=0;answered=false;order=shuffle(figs.map(function(_,i){return i}));el('final').style.display='none';el('game').style.display='block';show()}
el('yesBtn').onclick=function(){answer(true)};el('noBtn').onclick=function(){answer(false)};el('nextBtn').onclick=next;el('restartBtn').onclick=restart;restart();
})();
</script>
</body>
</html>
