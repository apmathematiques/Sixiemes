<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exercice interactif</title>
<style>
:root{
  --accent:#2F7F89;
  --success:#C8FE53;
  --success-ink:#294100;
  --error:#FFF1EF;
  --error-ink:#8D2F24;
  --error-border:#F3A89F;
  --ink:#171717;
  --muted:#666;
}
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%}
body{
  font-family:Arial,sans-serif;
  background:transparent;
  color:var(--ink);
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}
button,input{font:inherit}
#app{width:min(96vw,1020px);height:min(96vh,700px);padding:14px}
.hud{
  display:flex;
  justify-content:space-between;
  gap:12px;
  background:rgba(255,255,255,.88);
  border-radius:14px;
  padding:10px 16px;
  margin-bottom:12px;
  font-size:clamp(15px,2vw,21px);
  font-weight:bold;
  box-shadow:0 5px 16px rgba(0,0,0,.05)
}
.card{
  background:rgba(255,255,255,.94);
  border-radius:24px;
  min-height:calc(100% - 56px);
  padding:clamp(14px,2.4vw,24px);
  box-shadow:0 10px 25px rgba(0,0,0,.08);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:16px;
  text-align:center
}
.question{font-size:clamp(20px,2.7vw,29px);margin:0}
.figure-wrap{
  width:min(100%,760px);
  min-height:190px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(255,255,255,.72);
  border:3px solid #ECECEC;
  border-radius:22px;
  padding:12px;
}
.figure-wrap svg{width:100%;max-width:560px;height:auto;display:block}
.answer-label{font-size:clamp(17px,2.1vw,22px);font-weight:bold}
.fraction-input{
  display:grid;
  grid-template-rows:auto 4px auto;
  gap:7px;
  align-items:center;
  justify-items:center
}
.fraction-input input{
  width:112px;
  height:52px;
  border:3px solid #DDD;
  border-radius:13px;
  text-align:center;
  font-size:clamp(23px,4vw,33px);
  font-weight:800;
  outline:none;
  background:white
}
.fraction-input input:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 4px rgba(47,127,137,.12)
}
.bar{width:132px;height:4px;background:#111;border-radius:3px}
.help{font-size:clamp(13px,1.6vw,16px);color:var(--muted)}
.actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.action{
  border:0;
  border-radius:15px;
  padding:11px 22px;
  background:var(--accent);
  color:white;
  font-size:clamp(16px,1.9vw,20px);
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 4px 0 rgba(0,0,0,.15);
  min-width:190px
}
.action:disabled{opacity:.55;cursor:default}
#nextBtn{display:none}
#feedback{
  display:none;
  width:min(100%,760px);
  border-radius:15px;
  padding:11px 14px;
  font-size:clamp(14px,1.8vw,18px);
  line-height:1.38
}
#feedback.success{
  display:block;
  background:var(--success);
  color:var(--success-ink);
  font-weight:bold
}
#feedback.error{
  display:block;
  background:var(--error);
  color:var(--error-ink);
  border:2px solid var(--error-border)
}
#final{
  display:none;
  height:100%;
  background:rgba(255,255,255,.96);
  border-radius:24px;
  padding:34px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,.08)
}
#finalInner{
  height:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:18px
}
#final h1{margin:0;font-size:clamp(28px,4vw,42px)}
#finalScore{font-size:clamp(54px,10vw,90px);font-weight:900;color:var(--accent)}
#advice{font-size:clamp(20px,3vw,28px);max-width:760px;line-height:1.35}
#restartBtn{display:inline-block}
@media(max-width:620px){
  #app{padding:8px}
  .card{gap:10px;padding:10px}
  .figure-wrap{min-height:215px}
}
@media(max-height:650px){
  .card{gap:8px;padding:8px}
  .figure-wrap{min-height:185px}
  .fraction-input input{height:44px}
}
</style>
</head>
<body>
<div id="app">
  <div id="game">
    <div class="hud">
      <span id="progress"></span>
      <span id="score"></span>
    </div>

    <div class="card">
      <p class="question">Quel est le pas de cette demi-droite graduée&nbsp;?</p>

      <div class="figure-wrap" id="figureWrap"></div>

      <div class="answer-label">Le pas vaut :</div>

      <div class="fraction-input" aria-label="Saisir le pas">
        <input id="numInput" inputmode="numeric" pattern="[0-9]*" maxlength="3" aria-label="Numérateur">
        <div class="bar"></div>
        <input id="denInput" inputmode="numeric" pattern="[0-9]*" maxlength="3" aria-label="Dénominateur">
      </div>

      <div class="help">Pour un entier, laisse la case du bas vide.</div>

      <div id="feedback" role="status"></div>

      <div class="actions">
        <button class="action" id="validateBtn">Valider</button>
        <button class="action" id="nextBtn">Question suivante</button>
      </div>
    </div>
  </div>

  <div id="final">
    <div id="finalInner">
      <h1>Bilan</h1>
      <div id="finalScore"></div>
      <div id="advice"></div>
      <button class="action" id="restartBtn">Recommencer</button>
    </div>
  </div>
</div>

<script>
(function(){
"use strict";

var current=0,score=0,answered=false,questions=[];

function el(id){return document.getElementById(id)}
function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function choice(a){return a[rand(0,a.length-1)]}
function gcd(a,b){while(b){var t=b;b=a%b;a=t}return Math.abs(a)}
function sameFraction(a,b,c,d){return b!==0 && d!==0 && a*d===c*b}

function makeQuestion(){
  var possibilities=[];

  // Pas entiers : 1, 2, 3 ou 4.
  for(var integerStep=1;integerStep<=4;integerStep++){
    for(var integerIntervals=2;integerIntervals<=8;integerIntervals++){
      var integerDifference=integerStep*integerIntervals;
      if(integerDifference<=10){
        possibilities.push({
          stepNum:integerStep,
          stepDen:1,
          intervals:integerIntervals,
          difference:integerDifference
        });
      }
    }
  }

  // Fractions unitaires : 1/2, 1/3, ..., 1/8.
  for(var den=2;den<=8;den++){
    for(var intervals=2;intervals<=8;intervals++){
      if(intervals%den!==0)continue;

      var difference=intervals/den;
      if(Number.isInteger(difference) && difference>=1 && difference<=8){
        possibilities.push({
          stepNum:1,
          stepDen:den,
          intervals:intervals,
          difference:difference
        });
      }
    }
  }

  var p=choice(possibilities);
  var start=rand(0,Math.max(0,10-p.difference));
  var end=start+p.difference;

  return {
    start:start,
    end:end,
    intervals:p.intervals,
    stepNum:p.stepNum,
    stepDen:p.stepDen
  };
}

function buildQuestions(){
  var out=[];
  var signatures={};

  while(out.length<10){
    var q=makeQuestion();
    var key=[q.start,q.end,q.intervals].join("-");
    if(!signatures[key]){
      signatures[key]=true;
      out.push(q);
    }
  }
  return out;
}

function drawAxis(q){
  var x0=55,x1=650,y=140;
  var arrowEnd=685;
  var step=(x1-x0)/q.intervals;
  var ticks=[];

  ticks.push(`<line x1="${x0-24}" y1="${y}" x2="${arrowEnd}" y2="${y}" stroke="#202020" stroke-width="5" stroke-linecap="round"/>`);
  ticks.push(`<path d="M ${arrowEnd-16} ${y-11} L ${arrowEnd} ${y} L ${arrowEnd-16} ${y+11}" fill="none" stroke="#202020" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>`);

  for(var i=0;i<=q.intervals;i++){
    var x=x0+i*step;
    ticks.push(`<line x1="${x}" y1="${y-17}" x2="${x}" y2="${y+17}" stroke="#202020" stroke-width="4"/>`);
  }

  ticks.push(`<text x="${x0}" y="${y+56}" text-anchor="middle" font-size="27" font-weight="700" fill="#171717">${q.start}</text>`);
  ticks.push(`<text x="${x1}" y="${y+56}" text-anchor="middle" font-size="27" font-weight="700" fill="#171717">${q.end}</text>`);

  return `<svg viewBox="0 0 720 220" role="img" aria-label="Demi-droite graduée de ${q.start} à ${q.end}">${ticks.join("")}</svg>`;
}

function formatFraction(n,d){
  if(d===1)return String(n);
  return n+"/"+d;
}

function updateHud(){
  el("progress").textContent="Question "+(current+1)+" / 10";
  el("score").textContent="Score : "+score+" / 10";
}

function showQuestion(){
  answered=false;
  updateHud();

  var q=questions[current];
  el("figureWrap").innerHTML=drawAxis(q);

  el("numInput").value="";
  el("denInput").value="";
  el("numInput").disabled=false;
  el("denInput").disabled=false;

  el("feedback").className="";
  el("feedback").style.display="none";
  el("feedback").textContent="";

  el("validateBtn").disabled=false;
  el("validateBtn").style.display="inline-block";
  el("nextBtn").style.display="none";

  setTimeout(function(){el("numInput").focus()},0);
}

function validate(){
  if(answered)return;

  var numText=el("numInput").value.trim();
  var denText=el("denInput").value.trim();

  if(numText===""){
    var f0=el("feedback");
    f0.className="error";
    f0.textContent="Saisis une réponse.";
    f0.style.display="block";
    return;
  }

  var a=Number(numText);
  var b=denText===""?1:Number(denText);

  if(!Number.isInteger(a)||!Number.isInteger(b)||a<0||b<=0){
    var f1=el("feedback");
    f1.className="error";
    f1.textContent="Saisis un entier ou une fraction valide.";
    f1.style.display="block";
    return;
  }

  answered=true;

  var q=questions[current];
  var ok=sameFraction(a,b,q.stepNum,q.stepDen);

  if(ok)score++;

  var fb=el("feedback");
  fb.className=ok?"success":"error";
  fb.innerHTML=ok
    ?"Bravo ! Tu as correctement déterminé le pas."
    :"Ce n'est pas la bonne réponse. Entre <strong>"+q.start+"</strong> et <strong>"+q.end+"</strong>, il y a <strong>"+q.intervals+"</strong> intervalles. Le pas vaut donc <strong>"+formatFraction(q.stepNum,q.stepDen)+"</strong>.";
  fb.style.display="block";

  el("numInput").disabled=true;
  el("denInput").disabled=true;
  el("validateBtn").disabled=true;
  el("validateBtn").style.display="none";
  el("nextBtn").style.display="inline-block";

  updateHud();
}

function next(){
  if(current<9){
    current++;
    showQuestion();
  }else{
    showFinal();
  }
}

function showFinal(){
  el("game").style.display="none";
  el("final").style.display="block";
  el("finalScore").textContent=score+"/10";

  var advice=score<=4
    ?"Compte bien le nombre d'intervalles entre les deux nombres indiqués."
    :score<=7
    ?"C'est en bonne voie ! Pense à partager l'écart entre les deux nombres par le nombre d'intervalles."
    :score<=9
    ?"Très bon travail !"
    :"Excellent ! Tu sais déterminer le pas d'une demi-droite graduée.";

  el("advice").textContent=advice;
}

function restart(){
  current=0;
  score=0;
  questions=buildQuestions();

  el("final").style.display="none";
  el("game").style.display="block";

  showQuestion();
}

el("validateBtn").onclick=validate;
el("nextBtn").onclick=next;
el("restartBtn").onclick=restart;

el("numInput").addEventListener("keydown",function(e){
  if(e.key==="Enter"){
    el("denInput").focus();
  }
});

el("denInput").addEventListener("keydown",function(e){
  if(e.key==="Enter"){
    validate();
  }
});

restart();
})();
</script>
</body>
</html>
