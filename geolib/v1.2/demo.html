<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="stylesheet" href="geolib.css">
<style>
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;font-family:Arial,sans-serif;background:#f3f4f6}
body{display:flex;align-items:center;justify-content:center;padding:16px}
.demo{
  width:min(1100px,100%);
  background:#fff;border-radius:18px;padding:18px;
  box-shadow:0 10px 30px rgba(0,0,0,.12)
}
h1{margin:0 0 6px;font-size:1.45rem}
p{margin:0 0 14px;color:#59616b}
#scene{width:100%;aspect-ratio:16/6}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
button{
  border:0;border-radius:10px;background:#2563eb;color:#fff;
  padding:10px 15px;font-weight:700;cursor:pointer
}
.info{margin-top:12px;padding:10px 12px;background:#eff6ff;border-radius:10px}
.tests{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
.test{padding:8px;border-radius:9px;background:#eaf8ee;font-weight:700}
</style>
</head>
<body>
<main class="demo">
  <h1>GeoLib v1.2 — Points atteignables</h1>
  <p>Les points sont générés dans une zone où l’équerre peut réellement être placée.</p>

  <div id="scene"></div>

  <div class="toolbar">
    <button id="newPoints">Nouveaux points</button>
    <button id="choose">Choisir un bord</button>
    <button id="clear">Effacer le tracé</button>
  </div>

  <div id="info" class="info"></div>

  <div class="tests">
    <div class="test">✓ Point atteignable</div>
    <div class="test">✓ Sélection du bord</div>
    <div class="test">✓ Vérification automatique</div>
  </div>
</main>

<script src="geolib.js"></script>
<script>
let scene,baseLine,setSquare,targetPoint;

function init(){
  if(scene)scene.destroy();

  scene=new GeoLib.Scene("#scene",{width:900,height:330});
  baseLine=scene.add(GeoLib.Random.line({
    width:900,
    height:330,
    margin:110
  }));

  setSquare=scene.add(new GeoLib.SetSquare({
    x:700,
    y:230,
    angle:-20
  }));

  const data=GeoLib.Random.points(4,{
    tool:setSquare,
    width:900,
    height:330,
    minDistance:80,
    names:["A","B","C","D"]
  });

  data.forEach((p,index)=>{
    const point=scene.add(new GeoLib.Point(p.x,p.y,{name:p.name}));
    if(index===0)targetPoint=point;
  });

  document.getElementById("info").textContent=
    "Le point A est dans la zone atteignable par l’équerre.";
}

document.getElementById("newPoints").onclick=init;

document.getElementById("choose").onclick=async()=>{
  scene.clearLayer("drawings");
  document.getElementById("info").textContent=
    "Clique sur le bord de l’équerre que tu veux utiliser.";

  const choice=await setSquare.trace({
    className:"geolib-line-wrong"
  });

  const result=GeoLib.Check.perpendicularConstruction({
    baseLine,
    point:targetPoint,
    drawnLine:choice.line,
    pointTolerance:10,
    angleTolerance:2
  });

  document.getElementById("info").textContent=
    `Passe par A : ${result.passPoint?"oui":"non"} — Perpendiculaire : ${result.perpendicular?"oui":"non"}.`;
};

document.getElementById("clear").onclick=()=>{
  scene.clearLayer("drawings");
  document.getElementById("info").textContent="Le tracé a été effacé.";
};

init();
</script>
</body>
</html>
