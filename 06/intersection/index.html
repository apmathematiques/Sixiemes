<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>
:root{--b:#2563eb;--bd:#1d4ed8;--bs:#eff6ff;--g:#2f9e44;--gs:#eaf8ee;--r:#d64545;--rs:#fdecec;--l:#dfe3e8}
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:transparent;font-family:Arial,sans-serif}body{display:flex;align-items:center;justify-content:center;padding:8px}.app{width:min(100%,960px);aspect-ratio:16/9;max-height:calc(100vh - 16px);background:#fffffff5;border-radius:18px;box-shadow:0 8px 24px #0002;overflow:hidden}.quiz{height:100%;display:grid;grid-template-rows:56px 1fr}.top{display:grid;grid-template-columns:1fr auto;gap:16px;align-items:center;padding:10px 18px;border-bottom:1px solid var(--l)}.pw{display:flex;align-items:center;gap:10px}.pt{flex:1;height:8px;background:#eceef1;border-radius:99px;overflow:hidden}.pf{height:100%;width:12.5%;background:var(--b)}.pl,.score{font-size:.9rem;font-weight:700;white-space:nowrap}.score{padding:7px 11px;border-radius:99px;background:var(--bs);color:var(--bd)}.content{min-height:0;display:grid;grid-template-rows:auto 1fr 44px 44px;gap:10px;padding:14px 18px 16px}.inst{margin:0;text-align:center;font-weight:700;font-size:clamp(1rem,1.9vw,1.25rem)}.fig{min-height:0;border:2px solid #dbeafe;border-radius:14px;background:#f8fbff;overflow:hidden;cursor:crosshair;touch-action:none}.fig.lock{cursor:default}svg{width:100%;height:100%;display:block}.l{stroke:#111;stroke-width:4;stroke-linecap:round}.gc{stroke:var(--g);stroke-width:4}.bc{stroke:var(--r);stroke-width:4}.gr{fill:none;stroke:var(--g);stroke-width:3}.fb{height:44px;border-radius:11px;padding:8px 12px;display:flex;align-items:center;white-space:nowrap;overflow:hidden;font-size:.9rem}.fb:empty{visibility:hidden}.good{background:var(--gs);border:1px solid #bfe7c8}.bad{background:var(--rs);border:1px solid #f0bcbc}.actions{text-align:center}.main{min-width:180px;height:44px;border:0;border-radius:12px;background:var(--b);color:#fff;font-weight:800;font-size:1rem}.main:disabled{opacity:.45}.final{display:none;height:100%;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:28px}.final.show{display:flex}.fs{font-size:3.4rem;font-weight:900;color:var(--bd);margin:8px}.ft{max-width:680px;font-size:1.05rem;line-height:1.4}
@media(max-width:760px){body{padding:4px}.app{max-height:calc(100vh - 8px)}.content{gap:7px;padding:10px 12px 12px;grid-template-rows:auto 1fr 40px 40px}.fb{height:40px}}
</style></head><body><main class="app"><section id="quiz" class="quiz"><div class="top"><div class="pw"><div class="pt"><div id="pf" class="pf"></div></div><div id="pl" class="pl">Question 1 / 8</div></div><div id="score" class="score">Score : 0 / 8</div></div><div class="content"><p class="inst">Clique sur le point d’intersection des deux droites.</p><div id="fig" class="fig"><svg id="svg" viewBox="0 0 900 330" preserveAspectRatio="none"></svg></div><div id="fb" class="fb"></div><div class="actions"><button id="main" class="main" disabled>Question suivante</button></div></div></section><section id="final" class="final"><div>Exercice terminé</div><div id="fs" class="fs"></div><p id="ft" class="ft"></p><button id="restart" class="main">Recommencer</button></section></main>
<script>
(()=>{const T=8,W=900,H=330,M=28,TOL=14;const r=(a,b)=>Math.random()*(b-a)+a,rad=d=>d*Math.PI/180;
function box(px,py,dx,dy){let p=[],e=1e-9,t,x,y;if(Math.abs(dx)>e){t=(M-px)/dx;y=py+t*dy;if(y>=M&&y<=H-M)p.push({x:M,y});t=(W-M-px)/dx;y=py+t*dy;if(y>=M&&y<=H-M)p.push({x:W-M,y})}if(Math.abs(dy)>e){t=(M-py)/dy;x=px+t*dx;if(x>=M&&x<=W-M)p.push({x,y:M});t=(H-M-py)/dy;x=px+t*dx;if(x>=M&&x<=W-M)p.push({x,y:H-M})}let u=[];for(const q of p)if(!u.some(z=>Math.hypot(q.x-z.x,q.y-z.y)<1))u.push(q);return u.slice(0,2)}
function make(){let I={x:r(105,W-105),y:r(70,H-70)},a1=r(5,175),a2;do{a2=r(5,175)}while(Math.abs(((a1-a2+90)%180)-90)<18||Math.abs(((a1-a2+90)%180)-90)>78);let d1={x:Math.cos(rad(a1)),y:Math.sin(rad(a1))},d2={x:Math.cos(rad(a2)),y:Math.sin(rad(a2))},l1=box(I.x,I.y,d1.x,d1.y),l2=box(I.x,I.y,d2.x,d2.y);return l1.length<2||l2.length<2?make():{I,lines:[l1,l2]}}
let qs=Array.from({length:T},make),i=0,s=0,lock=false,click=null;const svg=document.getElementById("svg"),fig=document.getElementById("fig"),fb=document.getElementById("fb"),main=document.getElementById("main"),pf=document.getElementById("pf"),pl=document.getElementById("pl"),sc=document.getElementById("score"),quiz=document.getElementById("quiz"),final=document.getElementById("final"),fs=document.getElementById("fs"),ft=document.getElementById("ft");
const line=(a,b,c)=>`<line x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}" class="${c}"/>`;const cross=(p,c,z=9)=>line({x:p.x-z,y:p.y-z},{x:p.x+z,y:p.y+z},c)+line({x:p.x-z,y:p.y+z},{x:p.x+z,y:p.y-z},c);
function draw(corr=false,ok=false){let q=qs[i],h=line(q.lines[0][0],q.lines[0][1],"l")+line(q.lines[1][0],q.lines[1][1],"l");if(corr){h+=cross(q.I,"gc")+`<circle cx="${q.I.x}" cy="${q.I.y}" r="16" class="gr"/>`;if(!ok&&click)h+=cross(click,"bc",8)}svg.innerHTML=h}
function render(){lock=false;click=null;fig.classList.remove("lock");fb.className="fb";fb.innerHTML="";main.disabled=true;main.textContent=i===T-1?"Voir le bilan":"Question suivante";pl.textContent=`Question ${i+1} / ${T}`;pf.style.width=`${(i+1)/T*100}%`;sc.textContent=`Score : ${s} / ${T}`;draw()}
fig.onpointerdown=e=>{if(lock)return;let q=qs[i],rect=svg.getBoundingClientRect();click={x:(e.clientX-rect.left)*W/rect.width,y:(e.clientY-rect.top)*H/rect.height};lock=true;fig.classList.add("lock");let ok=Math.hypot(click.x-q.I.x,click.y-q.I.y)<=TOL;if(ok){s++;fb.className="fb good";fb.innerHTML="<strong>✓</strong>&nbsp;C’est bien le point d’intersection."}else{fb.className="fb bad";fb.innerHTML="<strong>✗</strong>&nbsp;Le point d’intersection est ici : les deux droites se coupent en un seul point."}sc.textContent=`Score : ${s} / ${T}`;draw(true,ok);main.disabled=false};
main.onclick=()=>{if(!lock)return;i++;if(i>=T){quiz.style.display="none";final.classList.add("show");fs.textContent=`${s} / ${T}`;ft.textContent=s===8?"Excellent ! Tu repères très précisément le point d’intersection de deux droites.":s>=6?"Très bien. Continue à viser exactement l’endroit où les deux droites se coupent.":s>=3?"Tu progresses. Le point d’intersection appartient aux deux droites.":"Reprends calmement : cherche l’unique point commun aux deux droites."}else render()};
document.getElementById("restart").onclick=()=>{qs=Array.from({length:T},make);i=0;s=0;final.classList.remove("show");quiz.style.display="";render()};render()})();
</script></body></html>
