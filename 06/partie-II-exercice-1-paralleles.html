<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  :root{--blue:#2563eb;--blue-dark:#1746a2;--blue-soft:#eff6ff;--green:#15803d;--green-soft:#ecfdf3;--red:#c62828;--red-soft:#fff1f2;--ink:#172033;--muted:#5d6677}
  *{box-sizing:border-box}
  html,body{margin:0;width:100%;min-height:100%;font-family:Arial,Helvetica,sans-serif;color:var(--ink);background:transparent}
  body{display:flex;align-items:center;justify-content:center;padding:12px}
  button{font:inherit}
  .app{width:min(960px,100%);aspect-ratio:16/9;min-height:470px;max-height:94vh;display:flex;flex-direction:column;gap:11px;padding:16px;background:rgba(255,255,255,.96);border:1px solid #dce6f5;border-radius:20px;box-shadow:0 12px 32px rgba(24,53,92,.13);overflow:hidden}
  #exercise{height:100%;min-height:0;display:flex;flex-direction:column;gap:9px}
  .topbar{display:grid;grid-template-columns:1fr auto;align-items:center;gap:16px}
  .progress-wrap{display:flex;align-items:center;gap:10px;min-width:0}
  .progress-track{height:10px;flex:1;background:#e6edf7;border-radius:999px;overflow:hidden}
  .progress{height:100%;width:12.5%;background:linear-gradient(90deg,#60a5fa,var(--blue));border-radius:inherit;transition:width .3s ease}
  .counter,.score{font-weight:800;color:var(--blue-dark);white-space:nowrap}
  .score{padding:7px 11px;background:var(--blue-soft);border-radius:12px}
  .instruction{text-align:center;font-size:clamp(1rem,2.2vw,1.28rem);font-weight:800;margin:1px 0}
  .scene-card{position:relative;flex:1 1 auto;min-height:165px;border:2px solid #dbe6f5;border-radius:16px;background:linear-gradient(180deg,#fff,#f9fbff);overflow:hidden}
  svg{display:block;width:100%;height:100%;touch-action:none}
  .line-main{stroke:#18243a;stroke-width:4.2;stroke-linecap:round}
  .line-extension{stroke:#55708f;stroke-width:2.6;stroke-dasharray:10 9;opacity:0;transition:opacity .22s ease}
  .extensions-on .line-extension{opacity:.82}
  .line-label{font:700 24px Arial,sans-serif;fill:#18243a;paint-order:stroke;stroke:#fff;stroke-width:6px;stroke-linejoin:round}
  .intersection{fill:#dc2626;opacity:0;transition:opacity .22s ease}
  .extensions-on.show-intersection .intersection{opacity:1}
  .toolbar,.answers{display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap}
  .btn{border:0;border-radius:12px;padding:11px 19px;min-height:44px;font-weight:800;cursor:pointer;transition:transform .12s ease,filter .12s ease,box-shadow .12s ease}
  .btn:hover:not(:disabled){filter:brightness(.97);transform:translateY(-1px)}
  .btn:focus-visible{outline:3px solid #93c5fd;outline-offset:2px}
  .btn:disabled{opacity:.55;cursor:default}
  .extend{color:var(--blue-dark);background:var(--blue-soft);border:1px solid #bfdbfe}
  .answer{min-width:185px;color:#fff;box-shadow:0 5px 12px rgba(30,64,175,.16)}
  .yes{background:var(--blue)}
  .no{background:#475569}
  .next,.restart{background:var(--blue);color:#fff}
  .feedback{min-height:58px;display:flex;align-items:center;justify-content:center;text-align:center;padding:9px 14px;border-radius:13px;font-weight:700;line-height:1.3;background:#f4f7fb;color:var(--muted)}
  .feedback.hint{background:#fff8e7;color:#854d0e}
  .feedback.correct{background:var(--green-soft);color:var(--green)}
  .feedback.wrong{background:var(--red-soft);color:var(--red)}
  .hidden{display:none!important}
  .result{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:15px;padding:22px}
  .result-icon{width:78px;height:78px;display:grid;place-items:center;border-radius:50%;background:var(--blue-soft);font-size:2.4rem}
  .result h2{margin:0;font-size:clamp(1.45rem,3vw,2rem)}
  .result p{margin:0;color:var(--muted);font-size:1.05rem;max-width:620px}
  @media(max-width:650px){body{padding:5px}.app{padding:10px;gap:8px;border-radius:14px;min-height:500px}.scene-card{min-height:155px}.answer{min-width:145px;padding:10px 13px}.feedback{font-size:.92rem}.line-label{font-size:27px}}
</style>
</head>
<body>
<main class="app" aria-live="polite">
  <section id="exercise">
    <div class="topbar">
      <div class="progress-wrap"><span id="counter" class="counter">1 / 8</span><div class="progress-track" aria-label="Progression"><div id="progress" class="progress"></div></div></div>
      <div id="score" class="score">Score : 0</div>
    </div>
    <p class="instruction">Ces deux droites sont-elles parallèles&nbsp;?</p>
    <div id="sceneCard" class="scene-card">
      <svg id="scene" viewBox="0 0 900 360" role="img" aria-label="Deux droites à comparer"></svg>
    </div>
    <div class="toolbar"><button id="extend" class="btn extend hidden" type="button">Prolonger les droites</button></div>
    <div id="feedback" class="feedback" role="status">Observe attentivement la direction des deux droites.</div>
    <div id="answers" class="answers">
      <button class="btn answer yes" type="button" data-answer="true">Oui, elles sont parallèles</button>
      <button class="btn answer no" type="button" data-answer="false">Non, elles sont sécantes</button>
    </div>
    <div class="toolbar"><button id="next" class="btn next hidden" type="button">Question suivante</button></div>
  </section>
  <section id="result" class="result hidden">
    <div class="result-icon">✓</div><h2 id="resultTitle">Série terminée</h2><p id="resultText"></p>
    <button id="restart" class="btn restart" type="button">Rejouer avec de nouvelles figures</button>
  </section>
</main>

<script src="https://apmathematiques.github.io/Sixiemes/geolib/v1.2/geolib.js"></script>
<script>
(() => {
  'use strict';
  const W=900,H=360,N=8,NS='http://www.w3.org/2000/svg';
  const $=s=>document.querySelector(s), svg=$('#scene');
  const rand=(a,b)=>Math.random()*(b-a)+a;
  const choice=a=>a[Math.floor(Math.random()*a.length)];
  const shuffle=a=>{a=[...a];for(let i=a.length-1;i;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a};
  const norm=a=>((a%180)+180)%180;
  const pt=(cx,cy,a,t)=>({x:cx+Math.cos(a*Math.PI/180)*t,y:cy+Math.sin(a*Math.PI/180)*t});
  const el=(tag,attrs={})=>{const n=document.createElementNS(NS,tag);Object.entries(attrs).forEach(([k,v])=>n.setAttribute(k,v));return n};
  let questions=[],index=0,score=0,attempt=0,locked=false,extended=false;

  function lineTBounds(cx,cy,angle,pad=28){
    const d={x:Math.cos(angle*Math.PI/180),y:Math.sin(angle*Math.PI/180)},ts=[];
    if(Math.abs(d.x)>1e-8){ts.push((pad-cx)/d.x,(W-pad-cx)/d.x)}
    if(Math.abs(d.y)>1e-8){ts.push((pad-cy)/d.y,(H-pad-cy)/d.y)}
    const inside=t=>{const p={x:cx+d.x*t,y:cy+d.y*t};return p.x>=pad-.1&&p.x<=W-pad+.1&&p.y>=pad-.1&&p.y<=H-pad+.1};
    const valid=ts.filter(inside).sort((a,b)=>a-b);
    return [valid[0],valid[valid.length-1]];
  }

  function lineBox(cx,cy,angle,pad=28){
    const bounds=lineTBounds(cx,cy,angle,pad);
    return [pt(cx,cy,angle,bounds[0]),pt(cx,cy,angle,bounds[1])];
  }

  function visibleSegment(cx,cy,angle,wantedStart,wantedEnd){
    const bounds=lineTBounds(cx,cy,angle,42);
    let start=Math.max(bounds[0]+8,Math.min(wantedStart,wantedEnd));
    let end=Math.min(bounds[1]-8,Math.max(wantedStart,wantedEnd));
    if(end-start<80){
      const middle=(bounds[0]+bounds[1])/2;
      start=Math.max(bounds[0]+8,middle-100);
      end=Math.min(bounds[1]-8,middle+100);
    }
    return [pt(cx,cy,angle,start),pt(cx,cy,angle,end)];
  }

  function parallel(kind='parallel'){
    const angle=choice([rand(8,34),rand(146,172)]), center={x:rand(390,510),y:rand(150,210)};
    if(kind==='coincident'){
      const length=rand(470,590),segment=visibleSegment(center.x,center.y,angle,-length/2,length/2),a=segment[0],b=segment[1];
      return {type:'coincident',parallel:true,lines:[{cx:center.x,cy:center.y,angle,a,b,label:'(d)'},{cx:center.x,cy:center.y,angle,a,b,label:"(d')"}]};
    }
    const gap=rand(80,145),normal={x:-Math.sin(angle*Math.PI/180),y:Math.cos(angle*Math.PI/180)},length=rand(430,570);
    return {type:'parallel',parallel:true,lines:[-1,1].map((s,i)=>{const cx=center.x+s*normal.x*gap/2,cy=center.y+s*normal.y*gap/2,segment=visibleSegment(cx,cy,angle,-length/2,length/2);return {cx,cy,angle,a:segment[0],b:segment[1],label:i?'(d\u2032)':'(d)'}})};
  }

  function secant(type){
    let angle1=choice([rand(10,38),rand(142,170)]),delta;
    if(type==='near') delta=choice([-1,1])*rand(5.5,8);
    else delta=choice([-1,1])*rand(25,75);
    const angle2=norm(angle1+delta);
    let x,y,ranges;
    if(type==='visible'){
      x=rand(310,590);y=rand(120,240);ranges=[[-rand(190,270),rand(190,270)],[-rand(190,270),rand(190,270)]];
    }else{
      const side=choice(['left','right']);x=side==='left'?rand(75,135):rand(765,825);y=rand(105,255);
      ranges=[angle1,angle2].map(angle=>{
        const bounds=lineTBounds(x,y,angle,42);
        const positive=bounds[1],negative=-bounds[0],sign=positive>=negative?1:-1;
        const available=Math.max(positive,negative);
        return sign>0?[Math.min(75,available*.28),available-12]:[-Math.min(75,available*.28),-(available-12)];
      });
    }
    return {type,parallel:false,intersection:{x,y},lines:[angle1,angle2].map((angle,i)=>{const segment=visibleSegment(x,y,angle,ranges[i][0],ranges[i][1]);return {cx:x,cy:y,angle,a:segment[0],b:segment[1],label:i?'(d\u2032)':'(d)'}})};
  }

  function makeSeries(){
    const coincident=Math.random()<1/3;
    const list=[parallel(),parallel(),parallel(),parallel(coincident?'coincident':'parallel'),secant('visible'),secant('visible'),secant('hidden'),secant('near')];
    return shuffle(list);
  }

  function draw(q){
    svg.innerHTML='';$('#sceneCard').className='scene-card';extended=false;
    q.lines.forEach((l,i)=>{
      const full=lineBox(l.cx,l.cy,l.angle);
      svg.append(el('line',{x1:full[0].x,y1:full[0].y,x2:full[1].x,y2:full[1].y,class:'line-extension'}));
      svg.append(el('line',{x1:l.a.x,y1:l.a.y,x2:l.b.x,y2:l.b.y,class:'line-main'}));
      let lp=i===0?l.a:l.b;
      if(q.type==='coincident')lp=i===0?pt(l.cx,l.cy,l.angle,-180):pt(l.cx,l.cy,l.angle,180);
      const t=el('text',{x:Math.max(28,Math.min(W-72,lp.x+(i?8:-48))),y:Math.max(32,Math.min(H-18,lp.y-12)),class:'line-label'});t.textContent=l.label;svg.append(t);
    });
    if(q.intersection)svg.append(el('circle',{cx:q.intersection.x,cy:q.intersection.y,r:6,class:'intersection'}));
  }

  function showQuestion(){
    attempt=0;locked=false;
    $('#counter').textContent=`${index+1} / ${N}`;$('#progress').style.width=`${(index+1)/N*100}%`;$('#score').textContent=`Score : ${score.toLocaleString('fr-FR')}`;
    $('#feedback').className='feedback';$('#feedback').textContent='Observe attentivement la direction des deux droites.';
    $('#next').classList.add('hidden');document.querySelectorAll('.answer').forEach(b=>{b.classList.remove('hidden');b.disabled=false});
    $('#extend').disabled=false;$('#extend').textContent='Prolonger les droites';$('#extend').classList.add('hidden');draw(questions[index]);
  }

  function extend(){
    extended=!extended;$('#sceneCard').classList.toggle('extensions-on',extended);$('#sceneCard').classList.toggle('show-intersection',extended&&!questions[index].parallel);
    $('#extend').textContent=extended?'Masquer les prolongements':'Prolonger les droites';
  }

  function explanation(q){
    if(q.type==='coincident')return "Les deux noms désignent exactement la même droite : elles sont confondues.";
    if(q.parallel)return "Même prolongées, elles ne se coupent pas.";
    if(q.type==='visible')return "Leur point d’intersection est visible sur la figure.";
    return "Les prolongements font apparaître leur point d’intersection.";
  }

  function explicitAnswer(q){
    return q.parallel
      ? "Oui, ces deux droites sont parallèles."
      : "Non, ces deux droites ne sont pas parallèles : elles sont sécantes.";
  }

  function answer(value){
    if(locked)return;attempt++;
    const q=questions[index],ok=value===q.parallel,fb=$('#feedback');
    if(ok){
      score+=attempt===1?1:.5;locked=true;fb.className='feedback correct';fb.textContent=`✓ Bonne réponse ! ${explicitAnswer(q)} ${explanation(q)}`;finishQuestion();return;
    }
    if(attempt===1){$('#extend').classList.remove('hidden');fb.className='feedback hint';fb.textContent=`✗ Ce n’est pas la bonne réponse. ${q.parallel?'Indice : prolonge les droites et cherche un éventuel point d’intersection.':'Indice : utilise le bouton « Prolonger les droites » pour chercher un point d’intersection.'}`;return}
    locked=true;fb.className='feedback wrong';fb.textContent=`✗ Mauvaise réponse. Correction : ${explicitAnswer(q)} ${explanation(q)}`;finishQuestion();
  }

  function finishQuestion(){
    $('#score').textContent=`Score : ${score.toLocaleString('fr-FR')}`;document.querySelectorAll('.answer').forEach(b=>{b.disabled=true;b.classList.add('hidden')});
    if(!questions[index].parallel){extended=true;$('#sceneCard').classList.add('extensions-on','show-intersection');$('#extend').textContent='Masquer les prolongements'}
    $('#next').textContent=index===N-1?'Voir mon bilan':'Question suivante';$('#next').classList.remove('hidden');
  }

  function next(){if(!locked)return;if(++index<N){showQuestion();return}showResult()}
  function showResult(){
    $('#exercise').classList.add('hidden');$('#result').classList.remove('hidden');
    const pct=Math.round(score/N*100),msg=pct>=88?'Excellent : tu reconnais très bien les droites parallèles.':pct>=63?'Bravo : tu as compris l’essentiel. Pense à prolonger mentalement les droites quand tu hésites.':'Continue à t’entraîner : deux droites sont parallèles si elles ne sont pas sécantes, même lorsqu’on les prolonge.';
    $('#resultTitle').textContent=`Score : ${score.toLocaleString('fr-FR')} / ${N}`;$('#resultText').textContent=msg;
  }
  function start(){questions=makeSeries();index=0;score=0;$('#exercise').classList.remove('hidden');$('#result').classList.add('hidden');showQuestion()}
  $('#extend').addEventListener('click',extend);document.querySelectorAll('.answer').forEach(b=>b.addEventListener('click',()=>answer(b.dataset.answer==='true')));$('#next').addEventListener('click',next);$('#restart').addEventListener('click',start);start();
})();
</script>
</body>
</html>
