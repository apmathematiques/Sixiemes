<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="stylesheet" href="https://apmathematiques.github.io/Sixiemes/geolib/v1/geolib.css">
<style>
:root{--b:#2563eb;--bd:#1d4ed8;--bs:#eff6ff;--g:#2f9e44;--gs:#eaf8ee;--r:#d64545;--rs:#fdecec;--l:#dfe3e8}
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:transparent;font-family:Arial,sans-serif}
body{display:flex;align-items:center;justify-content:center;padding:8px}.app{width:min(100%,960px);aspect-ratio:16/9;max-height:calc(100vh - 16px);background:#fffffff5;border-radius:18px;box-shadow:0 8px 24px #0002;overflow:hidden}.quiz{height:100%;display:grid;grid-template-rows:56px 1fr}.top{display:grid;grid-template-columns:1fr auto;gap:16px;align-items:center;padding:10px 18px;border-bottom:1px solid var(--l)}.pw{display:flex;align-items:center;gap:10px}.pt{flex:1;height:8px;background:#eceef1;border-radius:99px;overflow:hidden}.pf{height:100%;width:12.5%;background:var(--b)}.pl,.score{font-size:.9rem;font-weight:700;white-space:nowrap}.score{padding:7px 11px;border-radius:99px;background:var(--bs);color:var(--bd)}.content{min-height:0;display:grid;grid-template-rows:auto 1fr 48px 44px;gap:10px;padding:14px 18px 16px}.inst{margin:0;text-align:center;font-size:clamp(1rem,1.9vw,1.25rem);font-weight:700}#scene{width:100%;height:100%}.answers{display:grid;grid-template-columns:1fr 1fr;gap:12px}.answer{border:2px solid var(--l);border-radius:12px;background:#fff;color:#000;font-size:1.03rem;font-weight:800}.answer.selected{border-color:var(--b);background:var(--bs)}.answer.correct{border-color:var(--g);background:var(--gs)}.answer.wrong{border-color:var(--r);background:var(--rs)}.fb{height:44px;border-radius:11px;padding:8px 12px;display:flex;align-items:center;white-space:nowrap;overflow:hidden;font-size:.9rem}.fb:empty{visibility:hidden}.fb.success{background:var(--gs);border:1px solid #bfe7c8}.fb.error{background:var(--rs);border:1px solid #f0bcbc}.actions{text-align:center}.main{min-width:180px;height:44px;border:0;border-radius:12px;background:var(--b);color:#fff;font-size:1rem;font-weight:800}.main:disabled{opacity:.45}.final{display:none;height:100%;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:28px}.final.show{display:flex}.fs{font-size:3.4rem;font-weight:900;color:var(--bd);margin:8px}.ft{max-width:680px;font-size:1.05rem;line-height:1.4}@media(max-width:760px){body{padding:4px}.app{max-height:calc(100vh - 8px)}.top{padding:8px 12px}.content{gap:7px;padding:10px 12px 12px;grid-template-rows:auto 1fr 44px 40px}.fb{height:40px}}
</style>
</head>
<body>
<main class="app">
<section id="quiz" class="quiz">
<div class="top"><div class="pw"><div class="pt"><div id="pf" class="pf"></div></div><div id="pl" class="pl">Question 1 / 8</div></div><div id="score" class="score">Score : 0 / 8</div></div>
<div class="content">
<p class="inst">Utilise l’équerre puis réponds : ces deux droites sont-elles perpendiculaires&nbsp;?</p>
<div id="scene"></div>
<div class="answers"><button class="answer" data-a="yes">Oui</button><button class="answer" data-a="no">Non</button></div>
<div id="fb" class="fb"></div>
<div class="actions"><button id="main" class="main" disabled>Valider</button></div>
</div>
</section>
<section id="final" class="final"><div>Exercice terminé</div><div id="fs" class="fs"></div><p id="ft" class="ft"></p><button id="restart" class="main">Recommencer</button></section>
</main>
<script src="https://apmathematiques.github.io/Sixiemes/geolib/v1/geolib.js"></script>
<script>
(()=>{const T=8,sh=a=>{a=[...a];for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a},rnd=(a,b)=>Math.random()*(b-a)+a;function make(perp){const p={x:rnd(220,680),y:rnd(85,245)},a1=rnd(10,170),vals=[68,74,79,82,98,102,106,112],d=perp?90:vals[Math.floor(Math.random()*vals.length)];return{perp,p,a1,a2:(a1+d)%180}}function build(){return sh([make(true),make(true),make(true),make(true),make(false),make(false),make(false),make(false)])}let qs=build(),i=0,s=0,sel=null,lock=false,scene=null,l1=null,l2=null,eq=null;const btn=[...document.querySelectorAll('.answer')],fb=document.getElementById('fb'),main=document.getElementById('main'),pf=document.getElementById('pf'),pl=document.getElementById('pl'),sc=document.getElementById('score'),quiz=document.getElementById('quiz'),final=document.getElementById('final'),fs=document.getElementById('fs'),ft=document.getElementById('ft');function create(q){if(scene)scene.destroy();scene=new GeoLib.Scene('#scene',{width:900,height:330,keyboard:true});l1=scene.add(new GeoLib.Line(q.p,q.a1));l2=scene.add(new GeoLib.Line(q.p,q.a2));eq=scene.add(new GeoLib.SetSquare({x:650,y:230,angle:-18,allowMove:true,allowRotate:true}))}function render(){let q=qs[i];sel=null;lock=false;create(q);btn.forEach(b=>{b.disabled=false;b.className='answer'});fb.className='fb';fb.innerHTML='';main.textContent='Valider';main.disabled=true;pl.textContent=`Question ${i+1} / ${T}`;pf.style.width=`${(i+1)/T*100}%`;sc.textContent=`Score : ${s} / ${T}`}btn.forEach(b=>b.onclick=()=>{if(lock)return;sel=b.dataset.a;btn.forEach(x=>x.classList.toggle('selected',x.dataset.a===sel));main.disabled=false});function validate(){if(!sel||lock)return;lock=true;let q=qs[i],ok=(sel==='yes')===Boolean(q.perp),ca=q.perp?'yes':'no',cb=btn.find(b=>b.dataset.a===ca),sb=btn.find(b=>b.dataset.a===sel);btn.forEach(b=>b.disabled=true);cb.classList.add('correct');if(!ok)sb.classList.add('wrong');else s++;fb.className='fb '+(ok?'success':'error');fb.innerHTML=q.perp?`<strong>${ok?'✓':'✗'}</strong>&nbsp;Oui : les deux droites forment un angle droit.`:`<strong>${ok?'✓':'✗'}</strong>&nbsp;Non : elles sont sécantes, mais ne forment pas un angle droit.`;eq.allowMove=false;eq.allowRotate=false;eq.snapToLine(l1,{edge:'horizontal',point:q.p});sc.textContent=`Score : ${s} / ${T}`;main.textContent=i===T-1?'Voir le bilan':'Question suivante';main.disabled=false}main.onclick=()=>{if(!lock)return validate();i++;if(i>=T){if(scene)scene.destroy();quiz.style.display='none';final.classList.add('show');fs.textContent=`${s} / ${T}`;ft.textContent=s===8?'Excellent ! Tu sais utiliser l’équerre pour reconnaître des droites perpendiculaires.':s>=6?'Très bien. Continue à vérifier précisément l’angle droit avec l’équerre.':s>=3?'Tu progresses. Les deux côtés de l’angle droit de l’équerre doivent coïncider avec les deux droites.':'Reprends calmement : des droites perpendiculaires sont sécantes et forment un angle droit.'}else render()};document.getElementById('restart').onclick=()=>{qs=build();i=0;s=0;final.classList.remove('show');quiz.style.display='';render()};render()})();
</script>
</body>
</html>
