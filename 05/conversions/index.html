<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root{
  --blue:#2563eb; --blue-dark:#1d4ed8; --blue-soft:#eff6ff;
  --green:#2f9e44; --green-soft:#eaf8ee;
  --red:#d64545; --red-soft:#fdecec;
  --ink:#22252a; --muted:#6f737a; --line:#dfe3e8;
  --card:rgba(255,255,255,.96);
}
*{box-sizing:border-box}
html,body{
  margin:0;width:100%;height:100%;overflow:hidden;background:transparent;
  font-family:Arial,Helvetica,sans-serif;color:var(--ink)
}
body{display:flex;align-items:center;justify-content:center;padding:8px}
.app{
  width:min(100%,960px);aspect-ratio:16/9;max-height:calc(100vh - 16px);
  background:var(--card);border-radius:18px;box-shadow:0 8px 24px rgba(0,0,0,.14);
  overflow:hidden;padding:14px 18px 16px;
  display:grid;grid-template-rows:auto auto 1fr auto;gap:10px
}
.selector{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.family-btn{
  min-height:42px;border:2px solid var(--line);border-radius:12px;background:#fff;
  font-weight:800;font-size:1rem;cursor:pointer;color:#000
}
.family-btn.active{border-color:var(--blue);background:var(--blue-soft);color:var(--blue-dark)}
.controls{
  display:grid;grid-template-columns:1.25fr auto .75fr;gap:12px;align-items:end
}
.measure-input{
  display:grid;
  grid-template-columns:1fr 110px;
  gap:8px;
}
.control-group{display:grid;gap:6px}
.control-group label{font-size:.9rem;font-weight:700;color:var(--muted)}
.value-display,.unit-select{
  min-height:50px;border:2px solid var(--line);border-radius:12px;background:#fff;
  display:flex;align-items:center;justify-content:center;padding:0 12px;
  font-size:1.05rem;font-weight:800;color:#000
}
.value-display{border-color:var(--blue);font-size:1.7rem}
.value-display.placeholder{color:#9aa1aa;font-size:1rem;font-weight:600}
.arrow{font-size:1.6rem;font-weight:900;color:var(--blue);padding-bottom:8px}
.workspace{min-height:0;display:grid;grid-template-columns:1.35fr .65fr;gap:14px}
.left{min-height:0;display:grid;grid-template-rows:1fr auto;gap:10px}
.table-wrap{
  min-height:0;border:2px solid #dbeafe;border-radius:14px;background:#f8fbff;
  padding:10px;display:flex;align-items:center;justify-content:center
}
.table{
  width:100%;display:grid;grid-template-columns:repeat(9,1fr);
  border-left:2px solid #7d8792;border-top:2px solid #7d8792;
  position:relative
}
.head,.cell{
  border-right:2px solid #7d8792;border-bottom:2px solid #7d8792;
  display:flex;align-items:center;justify-content:center;text-align:center;min-width:0
}
.head{
  min-height:36px;background:#eef2f7;font-weight:800;font-size:clamp(.72rem,1.25vw,.95rem)
}
.head.blank{background:#f5f6f8;color:transparent}
.head.source{background:#dbeafe;color:var(--blue-dark)}
.head.target{outline:3px solid var(--green);outline-offset:-3px;background:var(--green-soft)}
.cell{
  min-height:58px;background:#fff;font-size:clamp(1.25rem,2.5vw,2rem);font-weight:800;color:#000
}
.cell.zero-added{color:#7c848d}
.comma{
  position:absolute;top:57%;transform:translate(-50%,-50%);
  font-size:2rem;font-weight:900;color:var(--blue-dark);pointer-events:none
}
.result{
  min-height:52px;border-radius:12px;background:var(--green-soft);border:1px solid #bfe7c8;
  display:flex;align-items:center;justify-content:center;text-align:center;
  font-size:clamp(1rem,2vw,1.35rem);font-weight:800;padding:8px 12px
}
.result.empty{background:#f4f5f7;border-color:#e1e4e8;color:#858b93;font-size:.95rem}
.note{font-size:.82rem;color:var(--muted);text-align:center;line-height:1.25}
.keypad{
  min-height:0;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(5,1fr);gap:8px
}
.key{
  border:2px solid var(--line);border-radius:12px;background:#fff;color:#000;
  font-size:clamp(1.05rem,2.2vw,1.45rem);font-weight:800;cursor:pointer
}
.key:hover{border-color:var(--blue);background:var(--blue-soft)}
.key.wide{grid-column:1/span 3}
.key.utility{font-size:.95rem}
@media(max-width:760px){
  body{padding:4px}
  .app{max-height:calc(100vh - 8px);padding:10px 12px 12px;gap:7px;border-radius:13px}
  .family-btn{min-height:36px;font-size:.9rem}
  .value-display,.unit-select{min-height:44px}
  .workspace{grid-template-columns:1.4fr .6fr;gap:9px}
  .table-wrap{padding:7px}
  .head{min-height:30px}
  .cell{min-height:46px}
  .keypad{gap:5px}
  .key{border-radius:9px}
}
</style>
</head>
<body>
<main class="app">
  <div class="selector">
    <button class="family-btn active" data-family="length">Longueurs</button>
    <button class="family-btn" data-family="mass">Masses</button>
    <button class="family-btn" data-family="capacity">Contenances</button>
  </div>

  <div class="controls">
    <div class="control-group">
      <label>Mesure à convertir</label>
      <div class="measure-input">
        <div id="valueDisplay" class="value-display placeholder">Saisis une mesure</div>
        <select id="sourceSelect" class="unit-select" aria-label="Unité de départ"></select>
      </div>
    </div>
    <div class="arrow">→</div>
    <div class="control-group">
      <label>Convertir en</label>
      <select id="targetSelect" class="unit-select"></select>
    </div>
  </div>

  <div class="workspace">
    <section class="left">
      <div class="table-wrap">
        <div id="table" class="table"></div>
      </div>

      <div>
        <div id="result" class="result empty">Le résultat apparaîtra ici.</div>
        <div class="note">Les colonnes sans unité, placées avant et après le tableau, permettent d’accueillir un chiffre supplémentaire.</div>
      </div>
    </section>

    <section id="keypad" class="keypad">
      <button class="key" data-value="7">7</button>
      <button class="key" data-value="8">8</button>
      <button class="key" data-value="9">9</button>
      <button class="key" data-value="4">4</button>
      <button class="key" data-value="5">5</button>
      <button class="key" data-value="6">6</button>
      <button class="key" data-value="1">1</button>
      <button class="key" data-value="2">2</button>
      <button class="key" data-value="3">3</button>
      <button class="key" data-value="0">0</button>
      <button class="key" data-value=",">,</button>
      <button class="key utility" data-action="backspace">⌫</button>
      <button class="key utility wide" data-action="clear">Effacer</button>
    </section>
  </div>

  <div class="note">Clavier physique autorisé : chiffres, virgule ou point, Retour arrière, Suppr et Échap.</div>
</main>

<script>
(() => {
  const families = {
    length:["km","hm","dam","m","dm","cm","mm"],
    mass:["kg","hg","dag","g","dg","cg","mg"],
    capacity:["kL","hL","daL","L","dL","cL","mL"]
  };

  let family="length";
  let value="";

  const familyBtns=[...document.querySelectorAll(".family-btn")];
  const sourceSelect=document.getElementById("sourceSelect");
  const targetSelect=document.getElementById("targetSelect");
  const valueDisplay=document.getElementById("valueDisplay");
  const table=document.getElementById("table");
  const result=document.getElementById("result");
  const keypad=document.getElementById("keypad");

  function populateUnits(){
    const units=families[family];
    sourceSelect.innerHTML="";
    targetSelect.innerHTML="";
    units.forEach((u,i)=>{
      const a=document.createElement("option");
      a.value=i; a.textContent=u; sourceSelect.appendChild(a);
      const b=document.createElement("option");
      b.value=i; b.textContent=u; targetSelect.appendChild(b);
    });
    sourceSelect.value="3";
    targetSelect.value="4";
  }

  function updateValue(){
    if(value){
      valueDisplay.textContent=value;
      valueDisplay.classList.remove("placeholder");
    }else{
      valueDisplay.textContent="Saisis une mesure";
      valueDisplay.classList.add("placeholder");
    }
  }

  function parseValue(){
    if(!value || value==="," || value.endsWith(",")) return null;
    const n=Number(value.replace(",","."));
    return Number.isFinite(n)?n:null;
  }

  function formatNumber(n){
    const rounded=Math.round((n+Number.EPSILON)*1e9)/1e9;
    return rounded.toLocaleString("fr-FR",{maximumFractionDigits:9});
  }

  function buildTable(){
    const units=families[family];
    const source=Number(sourceSelect.value);
    const target=Number(targetSelect.value);

    table.innerHTML="";

    const headers=["",...units,""];
    headers.forEach((h,i)=>{
      const div=document.createElement("div");
      div.className="head"+((i===0 || i===8)?" blank":"");
      if(i===source+1) div.classList.add("source");
      if(i===target+1) div.classList.add("target");
      div.textContent=h;
      table.appendChild(div);
    });

    const cells=Array(9).fill("");
    const added=Array(9).fill(false);

    if(value){
      const [leftRaw,rightRaw=""]=value.split(",");
      const left=(leftRaw||"0").replace(/^0+(?=\d)/,"");
      const right=rightRaw;
      const sourceCol=source+1;

      const leftDigits=left.split("");
      leftDigits.forEach((d,k)=>{
        const col=sourceCol-(leftDigits.length-1-k);
        if(col>=0 && col<9) cells[col]=d;
      });

      right.split("").forEach((d,k)=>{
        const col=sourceCol+1+k;
        if(col>=0 && col<9) cells[col]=d;
      });

      const first=cells.findIndex(x=>x!=="");
      let last=-1;
      for(let i=8;i>=0;i--){if(cells[i]!==""){last=i;break}}

      const targetCol=target+1;
      if(first!==-1){
        if(targetCol<first){
          for(let i=targetCol;i<first;i++){cells[i]="0";added[i]=true}
        }
        if(targetCol>last){
          for(let i=last+1;i<=targetCol;i++){cells[i]="0";added[i]=true}
        }
      }

      const comma=document.createElement("div");
      comma.className="comma";
      comma.textContent=",";
      comma.style.left=`${((sourceCol+1)/9)*100}%`;
      table.appendChild(comma);
    }

    cells.forEach((d,i)=>{
      const div=document.createElement("div");
      div.className="cell"+(added[i]?" zero-added":"");
      div.textContent=d;
      table.appendChild(div);
    });
  }

  function updateResult(){
    const n=parseValue();
    if(n===null){
      result.className="result empty";
      result.textContent="Le résultat apparaîtra ici.";
      return;
    }

    const source=Number(sourceSelect.value);
    const target=Number(targetSelect.value);
    const shift=target-source;
    const converted=n*Math.pow(10,shift);

    const units=families[family];
    result.className="result";
    result.innerHTML=`${value}&nbsp;${units[source]}&nbsp;=&nbsp;<strong>${formatNumber(converted)}&nbsp;${units[target]}</strong>`;
  }

  function render(){
    updateValue();
    buildTable();
    updateResult();
  }

  function append(v){
    if(value.length>=12) return;
    if(v===","){
      if(value.includes(",")) return;
      if(value==="") value="0";
      value+=",";
    }else{
      value+=v;
    }
    render();
  }

  function backspace(){value=value.slice(0,-1);render()}
  function clearAll(){value="";render()}

  familyBtns.forEach(btn=>{
    btn.addEventListener("click",()=>{
      family=btn.dataset.family;
      familyBtns.forEach(b=>b.classList.toggle("active",b===btn));
      populateUnits();
      render();
    });
  });

  sourceSelect.addEventListener("change",render);
  targetSelect.addEventListener("change",render);

  keypad.addEventListener("click",e=>{
    const btn=e.target.closest("button");
    if(!btn) return;
    if(btn.dataset.value!==undefined) append(btn.dataset.value);
    if(btn.dataset.action==="backspace") backspace();
    if(btn.dataset.action==="clear") clearAll();
  });

  document.addEventListener("keydown",e=>{
    if(e.key>="0"&&e.key<="9"){e.preventDefault();append(e.key)}
    else if(e.key===","||e.key==="."){e.preventDefault();append(",")}
    else if(e.key==="Backspace"){e.preventDefault();backspace()}
    else if(e.key==="Delete"||e.key==="Escape"){e.preventDefault();clearAll()}
  });

  populateUnits();
  render();
})();
</script>
</body>
</html>
