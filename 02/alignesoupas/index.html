<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Alignement</title>
<style>
:root{--blue:#2F6FED;--orange:#EF713F;--green:#C8FE53;--ink:#151515}
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%}
body{font-family:Arial,sans-serif;background:transparent;color:var(--ink);display:flex;align-items:center;justify-content:center;overflow:hidden}
#app{width:min(96vw,940px);height:min(96vh,680px);padding:14px}
.hud{display:flex;justify-content:space-between;background:rgba(255,253,246,.92);border:2px solid #efe7d2;border-radius:16px;padding:10px 16px;margin-bottom:12px;font-size:clamp(15px,2vw,21px);font-weight:bold}
.card{min-height:calc(100% - 58px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center}
.instruction{font-size:clamp(18px,2.5vw,27px);font-weight:bold;width:min(96%,720px);background:rgba(255,255,255,.9);border-radius:17px;padding:14px 18px}
.figure{width:min(96%,720px);height:300px;background:white;border:2px solid #d9e4f5;border-radius:18px;display:flex;align-items:center;justify-content:center;box-shadow:0 7px 16px rgba(47,111,237,.10);position:relative}
.figure:before{content:"";position:absolute;inset:0;border-radius:16px;background:radial-gradient(circle,rgba(47,111,237,.15) 1px,transparent 1.4px);background-size:18px 18px;opacity:.6;pointer-events:none}
svg{width:95%;height:92%;overflow:visible;position:relative;z-index:2}
.answers{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
.choice{border:2px solid #e8dfc7;background:#fffaf0;border-radius:15px;padding:14px 30px;font-size:clamp(22px,3.4vw,34px);font-weight:bold;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.12);min-width:150px}
.choice:hover:not(:disabled){border-color:var(--blue);transform:translateY(-1px)}
.choice.correct{background:var(--green);border-color:var(--green)}
.choice.wrong{background:#FFD9D9;border-color:#FEB2B2}
.choice:disabled{cursor:default;opacity:1}
#feedback{display:none;width:min(96%,720px);border-radius:15px;padding:12px 14px;font-size:clamp(14px,1.8vw,18px);line-height:1.35}
.success{display:block!important;background:var(--green);font-weight:bold;color:#2d4100}
.explain{display:block!important;background:#EBF4FF;color:#2c5282;border:2px solid #D0E3F7}
.action{display:none;border:0;border-radius:15px;padding:12px 24px;background:var(--orange);color:white;font-size:20px;font-weight:bold;cursor:pointer;min-width:220px;box-shadow:0 4px 0 rgba(0,0,0,.18)}
#final{display:none;background:rgba(255,255,255,.92);border:2px solid #efe7d2;border-radius:24px;padding:34px;text-align:center}
#finalScore{font-size:clamp(55px,10vw,90px);font-weight:900;color:var(--blue);margin:20px}
#restartBtn{display:inline-block;background:var(--blue)}
@media(max-height:620px){.card{gap:8px}.figure{height:230px}.instruction{padding:9px}.choice{padding:10px 24px}}
</style>
</head>
<body>
<div id="app">
<div id="game">
<div class="hud"><span id="progress"></span><span id="score"></span></div>
<div class="card">
<div class="instruction" id="instruction"></div>
<div class="figure" id="figure"></div>
<div class="answers">
<button class="choice" id="yesBtn">Oui</button>
<button class="choice" id="noBtn">Non</button>
</div>
<div id="feedback"></div>
<button class="action" id="nextBtn">Question suivante</button>
</div>
</div>
<div id="final">
<h1>Bilan</h1><div id="finalScore"></div><div id="advice"></div><br>
<button class="action" id="restartBtn">Recommencer</button>
</div>
</div>

<script>
(function(){
var qs=[],current=0,score=0,answered=false;
var letters="ABCDEFGHJKLMNPRSTUV";

function E(id){return document.getElementById(id)}
function R(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function sh(a){for(var i=a.length-1;i>0;i--){var j=R(0,i),t=a[i];a[i]=a[j];a[j]=t}return a}
function pickLetters(n){var arr=sh(letters.split("")),out=[];for(var i=0;i<n;i++)out.push(arr[i]);return out}

function makeQuestion(truth){
 var L=pickLetters(4);
 var angle=R(-22,22)*Math.PI/180;
 var cx=310, cy=145;
 var dx=Math.cos(angle), dy=Math.sin(angle);

 var p1={x:cx-150*dx,y:cy-150*dy,l:L[0]};
 var p2={x:cx,y:cy,l:L[1]};
 var p3={x:cx+150*dx,y:cy+150*dy,l:L[2]};
 var p4={x:R(120,500),y:R(45,235),l:L[3]};

 if(!truth){
   // On déplace le troisième point hors de la droite, mais pas trop loin.
   p3.x += R(35,70) * (Math.random()<0.5 ? 1 : -1);
   p3.y += R(35,70) * (Math.random()<0.5 ? 1 : -1);
 }

 return {truth:truth,points:[p1,p2,p3,p4],asked:[L[0],L[1],L[2]],angle:angle};
}

function makeQuestions(){
 var a=[];
 for(var i=0;i<5;i++)a.push(makeQuestion(true));
 for(var j=0;j<5;j++)a.push(makeQuestion(false));
 return sh(a);
}

function cross(p){
 return '<g>'+
 '<line x1="'+(p.x-11)+'" y1="'+(p.y-11)+'" x2="'+(p.x+11)+'" y2="'+(p.y+11)+'" stroke="#151515" stroke-width="4" stroke-linecap="round"/>'+
 '<line x1="'+(p.x-11)+'" y1="'+(p.y+11)+'" x2="'+(p.x+11)+'" y2="'+(p.x-11)+'" stroke="transparent" stroke-width="4"/>'+
 '<line x1="'+(p.x-11)+'" y1="'+(p.y+11)+'" x2="'+(p.x+11)+'" y2="'+(p.y-11)+'" stroke="#151515" stroke-width="4" stroke-linecap="round"/>'+
 '<text x="'+(p.x+23)+'" y="'+(p.y-16)+'" font-size="23" font-weight="bold" font-family="Arial">'+p.l+'</text>'+
 '</g>';
}

function svg(q,showLine){
 var content='';
 if(showLine){
   var p1=q.points[0], p3=q.points[2];
   var dx=Math.cos(q.angle), dy=Math.sin(q.angle), cx=q.points[1].x, cy=q.points[1].y;
   content+='<line x1="'+(cx-260*dx)+'" y1="'+(cy-260*dy)+'" x2="'+(cx+260*dx)+'" y2="'+(cy+260*dy)+'" stroke="#2F6FED" stroke-width="4" stroke-linecap="round" opacity=".55"/>';
 }
 q.points.forEach(function(p){content+=cross(p)});
 return '<svg viewBox="0 0 620 290">'+content+'</svg>';
}

function updateHud(){
 E("progress").textContent="Question "+(current+1)+" / 10";
 E("score").textContent="Score : "+score+" / 10";
}

function show(){
 answered=false;updateHud();
 var q=qs[current];
 E("instruction").innerHTML="Les points <strong>"+q.asked.join(", ")+"</strong> sont-ils alignés ?";
 E("figure").innerHTML=svg(q,false);
 E("feedback").className="";E("feedback").style.display="none";E("feedback").textContent="";
 E("nextBtn").style.display="none";
 [E("yesBtn"),E("noBtn")].forEach(function(b){b.disabled=false;b.className="choice"});
}

function choose(ans,btn){
 if(answered)return;
 answered=true;
 var q=qs[current],ok=ans===q.truth;
 var good=q.truth?E("yesBtn"):E("noBtn");
 good.classList.add("correct");
 E("yesBtn").disabled=true;E("noBtn").disabled=true;
 var fb=E("feedback");

 if(ok){
   score++;updateHud();
   fb.className="success";
   fb.textContent="Bravo ! Bonne réponse.";
 }else{
   btn.classList.add("wrong");
   fb.className="explain";
   fb.textContent=q.truth
     ? "Ces trois points appartiennent à une même droite : ils sont alignés."
     : "Ces trois points n’appartiennent pas à une même droite : ils ne sont pas alignés.";
 }
 E("figure").innerHTML=svg(q,true);
 E("nextBtn").style.display="inline-block";
}

function next(){if(current<9){current++;show()}else done()}
function done(){
 E("game").style.display="none";E("final").style.display="block";
 E("finalScore").textContent=score+"/10";
 E("advice").textContent=score<=4?"Revois la définition : des points alignés appartiennent à une même droite.":score<=7?"C’est en bonne voie ! Attention aux alignements obliques.":score<=9?"Très bon travail !":"Excellent ! Tu maîtrises l’alignement.";
}
function restart(){current=0;score=0;qs=makeQuestions();E("final").style.display="none";E("game").style.display="block";show()}

E("yesBtn").onclick=function(){choose(true,this)};
E("noBtn").onclick=function(){choose(false,this)};
E("nextBtn").onclick=next;
E("restartBtn").onclick=restart;
restart();
})();
</script>
</body>
</html>
